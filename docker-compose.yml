# dezelisoftware/docker-compose.yml
version: '3.8'

services:
    db:
        image: postgres:15-alpine
        container_name: dezelisoftware_db
        volumes:
            - postgres_data:/var/lib/postgresql/data
        environment:
            - POSTGRES_DB=dezelidb
            - POSTGRES_USER=dezeliser
            - POSTGRES_PASSWORD=your_password_here
        networks:
            - dezelinet

    backend:
        build: ./back
        container_name: dezelisoftware_api
        env_file:
            - back/.env.prod
        volumes:
            - ./back:/app
            - static_volume:/app/static
            - media_volume:/app/media
        environment:
            - DATABASE_URL=postgres://dezeliser:your_password_here@db:5432/dezelidb
            - DEBUG=False
        depends_on:
            - db
        networks:
            - dezelinet

    nginx:
        build: ./front
        container_name: dezelisoftware_web
        ports:
            - "80:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - static_volume:/app/static:ro
            - media_volume:/app/media:ro
        depends_on:
            - backend
        networks:
            - dezelinet

networks:
    dezelinet:
        driver: bridge

volumes:
    postgres_data:
    static_volume:
    media_volume: